<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Forms</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2225%22 fill=%22%230f172a%22/><path d=%22M30 70 L50 30 L70 70 M40 50 L60 50%22 stroke=%22white%22 stroke-width=%228%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        primary: '#4f46e5',
                        surface: { light: '#ffffff', dark: '#0f172a' },
                        panel: { light: '#f8fafc', dark: '#1e293b' }
                    },
                    borderRadius: { 'xl': '1rem', '2xl': '1.5rem', '3xl': '2rem' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-link.active { background: #4f46e5; color: white; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="bg-white dark:bg-surface-dark text-slate-900 dark:text-slate-100 min-h-screen custom-scroll">

    <div class="flex">
        <aside id="nav-container" class="w-72 border-r dark:border-slate-800 bg-panel-light dark:bg-panel-dark sticky top-0 h-screen flex flex-col z-50">
            <div class="p-6">
                <div class="flex items-center justify-between mb-10">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white">
                            <i data-lucide="layers" class="w-5 h-5"></i>
                        </div>
                        <span class="text-xl font-extrabold tracking-tight uppercase">Architect</span>
                    </div>
                    <button onclick="toggleTheme()" class="p-2 rounded-lg bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 transition-all">
                        <i data-lucide="moon" id="theme-icon" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <nav class="flex-1 px-4 space-y-1">
                <button onclick="switchTab('build')" id="m-build" class="sidebar-link active w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition-all">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Design
                </button>
                <button onclick="switchTab('analytics')" id="m-analytics" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Analytics
                </button>
                <button onclick="switchTab('data')" id="m-data" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <i data-lucide="database" class="w-4 h-4"></i> Records
                </button>
                <button onclick="switchTab('settings')" id="m-settings" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <i data-lucide="settings" class="w-4 h-4"></i> Configuration
                </button>
            </nav>

            <div class="p-6 border-t dark:border-slate-800">
                <button onclick="copyLink()" class="w-full bg-slate-900 dark:bg-primary text-white py-3 rounded-xl font-bold text-xs uppercase tracking-wider hover:opacity-90 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="external-link" class="w-4 h-4"></i> Deploy Protocol
                </button>
            </div>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto">
            
            <section id="build-tab" class="tab-content active space-y-6 max-w-5xl mx-auto">
                <div class="bg-panel-light dark:bg-panel-dark p-10 rounded-3xl border dark:border-slate-800">
                    <input id="form-name" type="text" placeholder="Untitled Protocol" class="text-5xl font-extrabold w-full outline-none bg-transparent placeholder:text-slate-300 dark:placeholder:text-slate-700 tracking-tight">
                    <input id="form-desc" type="text" placeholder="Description of data capture objectives..." class="text-lg text-slate-500 w-full mt-4 outline-none bg-transparent font-medium">
                </div>

                <div id="builder-canvas" class="space-y-4"></div>

                <div class="grid grid-cols-4 gap-4">
                    <button onclick="addQuestion('text')" class="p-4 bg-white dark:bg-panel-dark border dark:border-slate-800 rounded-2xl hover:border-primary transition flex items-center gap-3">
                        <i data-lucide="type" class="text-primary w-5 h-5"></i>
                        <span class="text-xs font-bold uppercase tracking-tight">Text Field</span>
                    </button>
                    <button onclick="addQuestion('choice')" class="p-4 bg-white dark:bg-panel-dark border dark:border-slate-800 rounded-2xl hover:border-primary transition flex items-center gap-3">
                        <i data-lucide="list" class="text-primary w-5 h-5"></i>
                        <span class="text-xs font-bold uppercase tracking-tight">Multiple Choice</span>
                    </button>
                    <button onclick="addQuestion('scale')" class="p-4 bg-white dark:bg-panel-dark border dark:border-slate-800 rounded-2xl hover:border-primary transition flex items-center gap-3">
                        <i data-lucide="sliders" class="text-primary w-5 h-5"></i>
                        <span class="text-xs font-bold uppercase tracking-tight">Linear Scale</span>
                    </button>
                    <button onclick="addQuestion('rating')" class="p-4 bg-white dark:bg-panel-dark border dark:border-slate-800 rounded-2xl hover:border-primary transition flex items-center gap-3">
                        <i data-lucide="star" class="text-primary w-5 h-5"></i>
                        <span class="text-xs font-bold uppercase tracking-tight">Rating</span>
                    </button>
                </div>
            </section>

            <section id="analytics-tab" class="tab-content space-y-6">
                <div class="grid grid-cols-3 gap-6">
                    <div class="bg-white dark:bg-panel-dark p-8 rounded-3xl border dark:border-slate-800">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Total Submissions</p>
                        <h3 id="stat-count" class="text-5xl font-extrabold tracking-tight">0</h3>
                    </div>
                    <div class="bg-white dark:bg-panel-dark p-8 rounded-3xl border dark:border-slate-800">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Unique Originators</p>
                        <h3 id="stat-unique" class="text-5xl font-extrabold tracking-tight text-primary">0</h3>
                    </div>
                    <div class="bg-white dark:bg-panel-dark p-8 rounded-3xl border dark:border-slate-800">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Status</p>
                        <div class="flex items-center gap-2 mt-4">
                            <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                            <span class="font-bold text-xl uppercase tracking-tighter">Operational</span>
                        </div>
                    </div>
                </div>
                <div class="bg-white dark:bg-panel-dark p-8 rounded-3xl border dark:border-slate-800">
                    <canvas id="velocityChart" height="80"></canvas>
                </div>
            </section>

            <section id="data-tab" class="tab-content space-y-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-extrabold tracking-tight">Records Vault</h2>
                    <div class="flex gap-2">
                        <button onclick="exportData('json')" class="px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg text-xs font-bold uppercase hover:bg-primary hover:text-white transition">Export JSON</button>
                        <button onclick="clearAllData()" class="px-4 py-2 bg-red-50 dark:bg-red-950/20 text-red-500 rounded-lg text-xs font-bold uppercase hover:bg-red-500 hover:text-white transition">Clear Storage</button>
                    </div>
                </div>
                <div id="data-grid" class="space-y-3"></div>
            </section>

            <section id="settings-tab" class="tab-content space-y-6 max-w-2xl">
                <div class="bg-white dark:bg-panel-dark p-8 rounded-3xl border dark:border-slate-800">
                    <h3 class="text-xl font-bold mb-6">Engine Preferences</h3>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900 rounded-xl">
                            <div><p class="font-bold text-sm">Public Analytics</p><p class="text-xs text-slate-500">Enable summary view for respondents.</p></div>
                            <input type="checkbox" id="set-public" class="w-5 h-5 accent-primary">
                        </div>
                        <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900 rounded-xl">
                            <div><p class="font-bold text-sm">Response Cap</p><p class="text-xs text-slate-500">Limit total number of allowed entries.</p></div>
                            <input type="number" id="set-cap" class="w-20 p-2 bg-white dark:bg-slate-800 rounded border-none text-right font-bold text-sm" placeholder="0">
                        </div>
                    </div>
                </div>
            </section>

            <section id="fill-tab" class="tab-content space-y-6 max-w-3xl mx-auto py-12">
                <div id="fill-header" class="mb-12"></div>
                <form id="submission-form" class="space-y-4">
                    <div class="bg-white dark:bg-panel-dark p-8 rounded-3xl border dark:border-slate-800 shadow-sm">
                        <label class="block font-bold text-sm uppercase tracking-widest text-slate-400 mb-3">User Identifier</label>
                        <input type="text" name="sys_username" required placeholder="Enter ID..." class="w-full p-4 bg-slate-50 dark:bg-slate-900 rounded-xl outline-none focus:ring-2 ring-primary/20 text-xl font-bold">
                    </div>
                    <div id="fill-questions" class="space-y-4"></div>
                    <button type="submit" class="w-full py-6 bg-primary text-white rounded-3xl font-extrabold text-2xl shadow-lg hover:translate-y-[-2px] active:translate-y-[0px] transition-all">Submit Entry</button>
                </form>
            </section>

        </main>
    </div>

    <script>
        let db, config = { name: '', desc: '', qs: [], settings: { pub: false, cap: 0 } }, data = [], charts = {};

        const req = indexedDB.open("ArchitectEngineDB", 5);
        req.onupgradeneeded = e => {
            db = e.target.result;
            if(!db.objectStoreNames.contains("responses")) db.createObjectStore("responses", { autoIncrement: true });
            if(!db.objectStoreNames.contains("meta")) db.createObjectStore("meta", { keyPath: "id" });
        };
        req.onsuccess = e => { db = e.target.result; init(); };

        function init() {
            lucide.createIcons();
            if(localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
                lucide.createIcons();
            }
            sync();
            const p = new URLSearchParams(window.location.search);
            if(p.has('live')) { 
                document.getElementById('nav-container').style.display='none'; 
                switchTab('fill'); 
                renderLive(); 
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(t+'-tab').classList.add('active');
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active', 'text-slate-500'));
            document.getElementById('m-'+t).classList.add('active');
            if(t === 'analytics') renderAnalytics();
            if(t === 'data') renderData();
        }

        function addQuestion(type) {
            config.qs.push({ id: Date.now(), type, label: '', req: true, opts: ['Option 1', 'Option 2'] });
            renderBuilder();
            save();
        }

        function renderBuilder() {
            const container = document.getElementById('builder-canvas');
            container.innerHTML = config.qs.map((q, i) => `
                <div class="bg-white dark:bg-panel-dark p-8 rounded-2xl border dark:border-slate-800 relative group transition-all hover:border-slate-300 dark:hover:border-slate-600">
                    <button onclick="removeQuestion(${i})" class="absolute top-6 right-6 text-slate-300 hover:text-red-500 transition"><i data-lucide="x" class="w-4 h-4"></i></button>
                    <div class="flex items-center gap-3 mb-6">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${q.type}</span>
                    </div>
                    <input type="text" value="${q.label}" oninput="updateQ(${i},'label',this.value)" placeholder="Field Label" class="text-2xl font-bold w-full outline-none bg-transparent">
                    
                    <div class="mt-6">
                        ${q.type === 'choice' ? `
                            <div class="grid grid-cols-2 gap-3">
                                ${q.opts.map((o, oi) => `<input type="text" value="${o}" oninput="updateOpt(${i},${oi},this.value)" class="p-3 bg-slate-50 dark:bg-slate-900 rounded-lg text-sm border-none outline-none focus:ring-1 ring-primary">`).join('')}
                                <button onclick="addOpt(${i})" class="p-3 border border-dashed border-slate-200 dark:border-slate-700 rounded-lg text-[10px] font-bold text-slate-400 hover:text-primary transition-all">+ Add Option</button>
                            </div>
                        ` : `<div class="p-4 bg-slate-50 dark:bg-slate-900 rounded-xl border border-dashed border-slate-200 dark:border-slate-700 text-xs font-medium text-slate-400 uppercase">Input Container</div>`}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateQ(i,k,v) { config.qs[i][k]=v; save(); }
        function removeQuestion(i) { config.qs.splice(i,1); renderBuilder(); save(); }
        function addOpt(i) { config.qs[i].opts.push('New Option'); renderBuilder(); save(); }
        function updateOpt(i,oi,v) { config.qs[i].opts[oi]=v; save(); }

        function save() {
            config.name = document.getElementById('form-name').value;
            config.desc = document.getElementById('form-desc').value;
            config.settings.pub = document.getElementById('set-public').checked;
            config.settings.cap = document.getElementById('set-cap').value;
            db.transaction("meta","readwrite").objectStore("meta").put({id:"protocol", ...config});
        }

        async function sync() {
            db.transaction("meta","readonly").objectStore("meta").get("protocol").onsuccess = e => {
                if(e.target.result) {
                    config = e.target.result;
                    document.getElementById('form-name').value = config.name;
                    document.getElementById('form-desc').value = config.desc;
                    document.getElementById('set-public').checked = config.settings.pub;
                    document.getElementById('set-cap').value = config.settings.cap;
                    renderBuilder();
                }
            };
            db.transaction("responses","readonly").objectStore("responses").getAll().onsuccess = e => data = e.target.result;
        }

        function renderLive() {
            document.getElementById('fill-header').innerHTML = `<h1 class="text-6xl font-extrabold tracking-tight">${config.name||'Entry Form'}</h1><p class="text-xl text-slate-500 mt-4">${config.desc||''}</p>`;
            document.getElementById('fill-questions').innerHTML = config.qs.map(q => `
                <div class="bg-white dark:bg-panel-dark p-10 rounded-3xl border dark:border-slate-800 shadow-sm">
                    <label class="block font-bold text-2xl mb-8">${q.label}</label>
                    ${q.type === 'choice' ? q.opts.map(o => `
                        <label class="flex items-center gap-4 p-5 mb-2 hover:bg-slate-50 dark:hover:bg-slate-900 rounded-xl border border-transparent hover:border-slate-100 dark:hover:border-slate-800 transition-all cursor-pointer">
                            <input type="radio" name="${q.id}" value="${o}" class="w-5 h-5 accent-primary">
                            <span class="text-lg font-medium">${o}</span>
                        </label>
                    `).join('') : `<input type="text" name="${q.id}" class="w-full p-5 bg-slate-50 dark:bg-slate-900 rounded-2xl outline-none focus:ring-4 ring-primary/5 text-lg font-medium transition-all">`}
                </div>
            `).join('');
        }

        document.getElementById('submission-form').onsubmit = e => {
            e.preventDefault();
            const payload = { _timestamp: new Date().toISOString(), ...Object.fromEntries(new FormData(e.target)) };
            db.transaction("responses","readwrite").objectStore("responses").add(payload).onsuccess = () => {
                alert("Submission Recorded.");
                location.reload();
            };
        };

        function renderAnalytics() {
            document.getElementById('stat-count').innerText = data.length;
            document.getElementById('stat-unique').innerText = new Set(data.map(d => d.sys_username)).size;
            const ctx = document.getElementById('velocityChart').getContext('2d');
            if(charts.v) charts.v.destroy();
            charts.v = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d._timestamp.split('T')[1].split('.')[0]),
                    datasets: [{ label: 'Entry Flow', data: data.map((_,i)=>i+1), borderColor: '#4f46e5', tension: 0.4, borderWeight: 3, fill: false }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
            });
        }

        function renderData() {
            document.getElementById('data-grid').innerHTML = data.map(d => `
                <div class="bg-white dark:bg-panel-dark p-6 rounded-2xl border dark:border-slate-800 flex justify-between items-center transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center font-bold text-sm text-primary">${d.sys_username?.charAt(0).toUpperCase()}</div>
                        <div><p class="text-sm font-bold tracking-tight">${d.sys_username}</p><p class="text-[9px] font-medium text-slate-400 uppercase">${d._timestamp}</p></div>
                    </div>
                </div>
            `).reverse().join('');
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + '?live=1');
            alert("Entry URL Copied.");
        }

        function clearAllData() { if(confirm("Confirm removal of all local records?")) { db.transaction("responses","readwrite").objectStore("responses").clear(); location.reload(); } }

        function exportData(fmt) {
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `architect_export.json`; a.click();
        }
    </script>
</body>
</html>
