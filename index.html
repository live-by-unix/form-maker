<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indigo Apex | V4 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        primary: '#6366f1',
                        surface: { light: '#ffffff', dark: '#05070a' },
                        panel: { light: '#f8fafc', dark: '#0f111a' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-link.active { background: #6366f1; color: white; box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4); }
        .glass { backdrop-filter: blur(12px); background: rgba(15, 17, 26, 0.8); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
    </style>
</head>
<body class="bg-surface-light dark:bg-surface-dark text-slate-900 dark:text-slate-100 min-h-screen">

    <div class="flex">
        <aside id="admin-sidebar" class="hidden w-80 border-r dark:border-indigo-500/10 bg-panel-light dark:bg-panel-dark sticky top-0 h-screen flex flex-col z-50">
            <div class="p-8">
                <div class="flex items-center gap-3 mb-10">
                    <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/20">
                        <i data-lucide="shield-check" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <span class="text-xl font-extrabold tracking-tighter uppercase block leading-none">Indigo</span>
                        <span class="text-[9px] font-bold text-primary tracking-[0.3em] uppercase">Admin Terminal</span>
                    </div>
                </div>

                <nav class="space-y-2">
                    <button onclick="switchTab('build')" id="m-build" class="sidebar-link active w-full flex items-center gap-3 px-5 py-4 rounded-2xl font-bold text-sm transition-all">
                        <i data-lucide="layers" class="w-4 h-4"></i> Architect
                    </button>
                    <button onclick="switchTab('analytics')" id="m-analytics" class="sidebar-link w-full flex items-center gap-3 px-5 py-4 rounded-2xl font-bold text-sm text-slate-500 hover:bg-primary/10 transition-all">
                        <i data-lucide="bar-chart-big" class="w-4 h-4"></i> Intelligence
                    </button>
                    <button onclick="switchTab('data')" id="m-data" class="sidebar-link w-full flex items-center gap-3 px-5 py-4 rounded-2xl font-bold text-sm text-slate-500 hover:bg-primary/10 transition-all">
                        <i data-lucide="database" class="w-4 h-4"></i> Records Vault
                    </button>
                </nav>
            </div>

            <div class="mt-auto p-6 space-y-3">
                <div class="p-4 bg-indigo-500/5 rounded-2xl border border-indigo-500/10">
                    <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-2">Sync Status</p>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                        <span class="text-[10px] font-mono text-emerald-500">ENCRYPTED_LOCAL_LINK</span>
                    </div>
                </div>
                <button onclick="copyAdminLink()" class="w-full py-3 rounded-xl bg-slate-800 text-white text-[10px] font-black uppercase tracking-widest hover:bg-slate-700 transition flex items-center justify-center gap-2">
                    <i data-lucide="key" class="w-3 h-3"></i> Copy Admin URL
                </button>
                <button onclick="copyEntryLink()" class="w-full py-4 rounded-xl bg-primary text-white text-[10px] font-black uppercase tracking-widest hover:opacity-90 shadow-xl flex items-center justify-center gap-2">
                    <i data-lucide="external-link" class="w-3 h-3"></i> Copy Entry URL
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            
            <section id="build-tab" class="tab-content active p-12 max-w-5xl mx-auto space-y-8">
                <header class="mb-12">
                    <input id="form-name" type="text" oninput="save()" placeholder="Protocol Title" class="text-7xl font-black w-full outline-none bg-transparent placeholder:text-slate-100/10 tracking-tighter italic">
                    <input id="form-desc" type="text" oninput="save()" placeholder="Operational Briefing..." class="text-xl text-slate-500 w-full mt-4 outline-none bg-transparent font-medium border-l-2 border-indigo-500/20 pl-6">
                </header>

                <div id="builder-canvas" class="space-y-6"></div>

                <div class="flex items-center gap-4 pt-10">
                    <button onclick="addQuestion('text')" class="flex-1 p-6 bg-panel-dark border border-indigo-500/10 rounded-[2rem] hover:border-primary transition group text-center">
                        <i data-lucide="type" class="text-primary w-6 h-6 mx-auto mb-2"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest">Add Text</span>
                    </button>
                    <button onclick="addQuestion('choice')" class="flex-1 p-6 bg-panel-dark border border-indigo-500/10 rounded-[2rem] hover:border-primary transition group text-center">
                        <i data-lucide="check-square" class="text-primary w-6 h-6 mx-auto mb-2"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest">Add Choice</span>
                    </button>
                </div>
            </section>

            <section id="analytics-tab" class="tab-content p-12 space-y-10">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="md:col-span-2 bg-primary p-12 rounded-[3rem] text-white flex flex-col justify-between">
                        <h3 class="text-9xl font-black italic tracking-tighter" id="stat-count">0</h3>
                        <p class="text-sm font-black uppercase tracking-[0.4em] opacity-60">Total Captures</p>
                    </div>
                    <div class="bg-panel-dark p-10 rounded-[3rem] border border-indigo-500/10">
                        <p class="text-slate-500 font-bold text-[10px] uppercase mb-4 tracking-widest">User Variation</p>
                        <h4 id="stat-unique" class="text-5xl font-black">0</h4>
                    </div>
                    <div class="bg-panel-dark p-10 rounded-[3rem] border border-indigo-500/10 flex flex-col justify-center items-center">
                        <div class="w-16 h-16 rounded-full border-4 border-indigo-500/20 border-t-indigo-500 animate-spin mb-4"></div>
                        <span class="text-[9px] font-black uppercase text-indigo-400">Monitoring...</span>
                    </div>
                </div>
                <div class="bg-panel-dark p-10 rounded-[3rem] border border-indigo-500/10">
                    <canvas id="velocityChart" height="120"></canvas>
                </div>
            </section>

            <section id="data-tab" class="tab-content p-12 space-y-8">
                <div class="flex justify-between items-center">
                    <h2 class="text-6xl font-black tracking-tighter italic uppercase">Vault</h2>
                    <div class="flex gap-4">
                        <button onclick="exportCSV()" class="px-8 py-3 bg-emerald-500 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:scale-105 transition">Export CSV</button>
                        <button onclick="clearAllData()" class="px-8 py-3 bg-red-500/20 text-red-500 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition">Purge All</button>
                    </div>
                </div>
                <div id="data-grid" class="space-y-4"></div>
            </section>

            <section id="fill-tab" class="tab-content p-6 py-20 max-w-3xl mx-auto space-y-12">
                <div id="fill-header"></div>
                <form id="submission-form" class="space-y-6">
                    <div class="bg-panel-dark p-12 rounded-[3rem] border border-indigo-500/10 shadow-2xl">
                        <label class="block font-black text-xs uppercase tracking-[0.3em] text-indigo-400 mb-6 italic underline">1. IDENTIFICATION</label>
                        <input type="text" name="sys_username" required placeholder="ALIAS_ID" class="w-full p-6 bg-slate-900 rounded-2xl outline-none focus:ring-2 ring-primary text-3xl font-black uppercase tracking-tighter">
                    </div>
                    <div id="fill-questions" class="space-y-6"></div>
                    <button type="submit" class="w-full py-10 bg-primary text-white rounded-[2.5rem] font-black text-4xl shadow-2xl hover:scale-[1.02] active:scale-100 transition-all uppercase tracking-tighter italic">Confirm Transmission</button>
                </form>
            </section>

        </main>
    </div>

    <script>
        let db, config = { name: '', desc: '', qs: [] }, data = [], charts = {};
        const ADMIN_KEY = "admin_access_77";

        // DB INIT
        const req = indexedDB.open("IndigoApexV4", 1);
        req.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("responses", { autoIncrement: true });
            db.createObjectStore("meta", { keyPath: "id" });
        };
        req.onsuccess = e => { db = e.target.result; startup(); };

        async function startup() {
            lucide.createIcons();
            const params = new URLSearchParams(window.location.search);
            
            // Check Access Level
            if(params.get('mode') === 'admin' || params.get('key') === ADMIN_KEY) {
                document.getElementById('admin-sidebar').classList.remove('hidden');
                await sync();
                switchTab('build');
            } else {
                await sync();
                switchTab('fill');
                renderLive();
            }
        }

        async function sync() {
            return new Promise((res) => {
                db.transaction("meta","readonly").objectStore("meta").get("protocol").onsuccess = e => {
                    if(e.target.result) {
                        config = e.target.result;
                        document.getElementById('form-name').value = config.name;
                        document.getElementById('form-desc').value = config.desc;
                        renderBuilder();
                    }
                    db.transaction("responses","readonly").objectStore("responses").getAll().onsuccess = e => {
                        data = e.target.result;
                        res();
                    };
                };
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(t+'-tab').classList.add('active');
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active', 'text-slate-500'));
            const link = document.getElementById('m-'+t);
            if(link) link.classList.add('active');
            if(t === 'analytics') renderAnalytics();
            if(t === 'data') renderData();
        }

        // BUILDER
        function addQuestion(type) {
            config.qs.push({ id: 'q' + Date.now(), type, label: 'DATA_FIELD', opts: ['TRUE', 'FALSE'] });
            renderBuilder();
            save();
        }

        function renderBuilder() {
            const canvas = document.getElementById('builder-canvas');
            canvas.innerHTML = config.qs.map((q, i) => `
                <div class="bg-panel-dark p-10 rounded-[2.5rem] border border-indigo-500/10 relative group hover:border-primary transition-all">
                    <button onclick="removeQuestion(${i})" class="absolute top-8 right-8 text-slate-700 hover:text-red-500 transition"><i data-lucide="x-circle" class="w-6 h-6"></i></button>
                    <input type="text" value="${q.label}" oninput="updateQ(${i},this.value)" class="text-4xl font-black w-full outline-none bg-transparent tracking-tighter uppercase italic text-indigo-400">
                    <div class="mt-8">
                        ${q.type === 'choice' ? `
                            <div class="grid grid-cols-2 gap-4">
                                ${q.opts.map((o, oi) => `
                                    <input type="text" value="${o}" oninput="updateOpt(${i},${oi},this.value)" class="p-4 bg-slate-900 rounded-xl text-xs font-bold border-none outline-none focus:ring-1 ring-primary uppercase tracking-widest">
                                `).join('')}
                                <button onclick="addOpt(${i})" class="p-4 border-2 border-dashed border-slate-800 rounded-xl text-[10px] font-black text-slate-600 hover:text-primary transition uppercase">+ Add Option</button>
                            </div>
                        ` : `<div class="p-6 bg-slate-900/50 border-2 border-dashed border-slate-800 rounded-3xl text-[9px] font-black text-slate-700 uppercase tracking-[0.5em] text-center italic">Text Input Zone</div>`}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateQ(i, v) { config.qs[i].label = v; save(); }
        function removeQuestion(i) { config.qs.splice(i,1); renderBuilder(); save(); }
        function addOpt(i) { config.qs[i].opts.push('NEW_OPT'); renderBuilder(); save(); }
        function updateOpt(i, oi, v) { config.qs[i].opts[oi] = v; save(); }

        function save() {
            config.name = document.getElementById('form-name').value;
            config.desc = document.getElementById('form-desc').value;
            db.transaction("meta","readwrite").objectStore("meta").put({id:"protocol", ...config});
        }

        // RESPONDENT
        function renderLive() {
            document.getElementById('fill-header').innerHTML = `<h1 class="text-8xl font-black tracking-tighter italic uppercase text-primary leading-none">${config.name||'INDIGO_VOID'}</h1><p class="text-xl text-slate-500 mt-6 font-semibold uppercase tracking-widest">${config.desc||'Pending Protocol Information...'}</p>`;
            document.getElementById('fill-questions').innerHTML = config.qs.map(q => `
                <div class="bg-panel-dark p-12 rounded-[3.5rem] border border-indigo-500/10 shadow-2xl">
                    <label class="block font-black text-2xl mb-10 tracking-tight italic uppercase text-indigo-400">${q.label}</label>
                    ${q.type === 'choice' ? q.opts.map(o => `
                        <label class="flex items-center gap-5 p-6 mb-3 hover:bg-primary/10 rounded-3xl border border-transparent hover:border-primary transition-all cursor-pointer group">
                            <input type="radio" name="${q.id}" value="${o}" required class="w-6 h-6 accent-primary">
                            <span class="text-xl font-black text-slate-400 group-hover:text-white uppercase tracking-tighter">${o}</span>
                        </label>
                    `).join('') : `<input type="text" name="${q.id}" required placeholder="INPUT_DATA" class="w-full p-8 bg-slate-900 rounded-[2rem] outline-none focus:ring-2 ring-primary text-2xl font-bold uppercase tracking-widest transition-all">`}
                </div>
            `).join('');
        }

        document.getElementById('submission-form').onsubmit = e => {
            e.preventDefault();
            const payload = { _ts: new Date().toLocaleString(), ...Object.fromEntries(new FormData(e.target)) };
            db.transaction("responses","readwrite").objectStore("responses").add(payload).onsuccess = () => {
                alert("TRANSMISSION_COMPLETE");
                location.reload();
            };
        };

        // ADMIN TOOLS
        function renderAnalytics() {
            sync().then(() => {
                document.getElementById('stat-count').innerText = data.length;
                document.getElementById('stat-unique').innerText = new Set(data.map(d => d.sys_username)).size;
                const ctx = document.getElementById('velocityChart').getContext('2d');
                if(charts.v) charts.v.destroy();
                charts.v = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(d => d._ts.split(',')[1]),
                        datasets: [{ label: 'Flow', data: data.map((_,i)=>i+1), borderColor: '#6366f1', tension: 0.4, fill: true, backgroundColor: 'rgba(99,102,241,0.05)', borderWidth: 5 }]
                    },
                    options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#334155', font: { family: 'JetBrains Mono' } } } } }
                });
            });
        }

        function renderData() {
            sync().then(() => {
                const grid = document.getElementById('data-grid');
                grid.innerHTML = data.map(d => `
                    <div class="bg-panel-dark p-8 rounded-[2.5rem] border border-indigo-500/10 flex flex-col md:flex-row gap-6 items-start md:items-center">
                        <div class="bg-primary/20 p-6 rounded-3xl text-primary font-black text-xl italic">${d.sys_username[0]}</div>
                        <div class="flex-1">
                            <p class="text-2xl font-black italic uppercase tracking-tighter">${d.sys_username}</p>
                            <p class="text-[10px] font-mono text-slate-600 uppercase tracking-widest">${d._ts}</p>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${Object.entries(d).filter(([k])=>!k.startsWith('_') && k!=='sys_username').map(([k,v])=>`
                                <div class="px-4 py-2 bg-slate-900 rounded-lg border border-slate-800">
                                    <p class="text-[8px] font-black text-indigo-500 uppercase mb-1">${config.qs.find(q=>q.id===k)?.label || 'DATA'}</p>
                                    <p class="text-xs font-bold">${v}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).reverse().join('');
            });
        }

        function copyEntryLink() {
            const url = window.location.origin + window.location.pathname + '?mode=entry';
            navigator.clipboard.writeText(url); alert("ENTRY_URL_COPIED");
        }

        function copyAdminLink() {
            const url = window.location.origin + window.location.pathname + `?mode=admin&key=${ADMIN_KEY}`;
            navigator.clipboard.writeText(url); alert("ADMIN_URL_COPIED (KEEP SECRET!)");
        }

        function exportCSV() {
            let csv = "Timestamp,User," + config.qs.map(q => q.label).join(",") + "\n";
            data.forEach(d => {
                let row = [d._ts, d.sys_username];
                config.qs.forEach(q => row.push(d[q.id] || ""));
                csv += row.join(",") + "\n";
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `Indigo_Vault_Export.csv`; a.click();
        }

        function clearAllData() { if(confirm("PURGE ALL RECORDS?")) { db.transaction("responses","readwrite").objectStore("responses").clear(); renderData(); } }
    </script>
</body>
</html>
