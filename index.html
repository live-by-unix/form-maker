<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indigo Architect | V5 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 120px); overflow-y: auto; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #6366f1; color: white; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden">

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col h-full z-20">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-indigo-200 shadow-lg">
                    <i data-lucide="layers" class="w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-extrabold tracking-tighter uppercase italic text-slate-900">Indigo</h1>
            </div>

            <nav class="space-y-2">
                <button onclick="switchTab('build')" id="m-build" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all text-slate-500 hover:bg-slate-50">
                    <i data-lucide="pen-tool" class="w-4 h-4"></i> Architect
                </button>
                <button onclick="switchTab('data')" id="m-data" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all text-slate-500 hover:bg-slate-50">
                    <i data-lucide="database" class="w-4 h-4"></i> Records Vault
                </button>
            </nav>
        </div>

        <div class="mt-auto p-6 space-y-3 bg-slate-50/50">
            <div class="p-4 bg-white rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-[9px] font-black text-indigo-500 uppercase tracking-widest mb-1">Status</p>
                <p class="text-xs font-bold text-slate-700 flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Local Sync Active
                </p>
            </div>
            <button onclick="copyURL('admin')" class="w-full py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-800 transition">Admin Access URL</button>
            <button onclick="copyURL('entry')" class="w-full py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:opacity-90 shadow-lg transition">Public Entry URL</button>
        </div>
    </aside>

    <main class="flex-1 overflow-hidden relative flex flex-col">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-10 shrink-0">
            <div>
                <span class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.3em]">Protocol Management</span>
                <h2 id="header-title" class="text-2xl font-extrabold text-slate-800 tracking-tight italic">New_Protocol_01</h2>
            </div>
            <div class="flex gap-3">
                <button onclick="addQuestion('text')" class="flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold hover:border-indigo-500 transition">
                    <i data-lucide="plus" class="w-4 h-4 text-indigo-500"></i> Add Text Field
                </button>
                <button onclick="addQuestion('choice')" class="flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold hover:border-indigo-500 transition">
                    <i data-lucide="list" class="w-4 h-4 text-indigo-500"></i> Add Choice Field
                </button>
            </div>
        </header>

        <div class="p-10 flex-1 overflow-hidden">
            
            <section id="build-tab" class="tab-content active max-w-4xl mx-auto space-y-6">
                <div class="glass-card p-10 mb-8 border-l-8 border-l-indigo-600">
                    <input id="form-name" type="text" oninput="saveProtocol()" placeholder="Protocol Title..." class="text-4xl font-black w-full outline-none bg-transparent placeholder:text-slate-200 tracking-tighter">
                    <input id="form-desc" type="text" oninput="saveProtocol()" placeholder="Describe the mission parameters..." class="text-lg text-slate-400 w-full mt-2 outline-none bg-transparent font-medium">
                </div>

                <div id="builder-canvas" class="space-y-4">
                    </div>

                <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 border-2 border-dashed border-slate-200 rounded-[3rem]">
                    <i data-lucide="component" class="w-12 h-12 text-slate-200 mb-4"></i>
                    <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Architect Canvas Empty</p>
                </div>
            </section>

            <section id="data-tab" class="tab-content max-w-5xl mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-3xl font-black italic tracking-tighter">Data_Vault</h3>
                    <button onclick="exportCSV()" class="px-6 py-2 bg-emerald-500 text-white rounded-xl text-xs font-bold hover:scale-105 transition">Export CSV</button>
                </div>
                <div id="data-grid" class="space-y-4">
                    </div>
            </section>

            <section id="fill-tab" class="tab-content max-w-2xl mx-auto py-10">
                <div id="fill-header" class="mb-10 text-center"></div>
                <form id="submission-form" class="space-y-6">
                    <div class="glass-card p-8 shadow-xl">
                        <label class="block font-black text-xs uppercase text-indigo-500 mb-4 italic tracking-widest">Entry Identifier</label>
                        <input type="text" name="sys_username" required placeholder="ALIAS_ID" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-xl border border-transparent focus:border-indigo-500 transition">
                    </div>
                    <div id="fill-questions" class="space-y-4"></div>
                    <button type="submit" class="w-full py-8 bg-indigo-600 text-white rounded-[2rem] font-black text-2xl shadow-xl hover:bg-indigo-700 transition-all uppercase tracking-tighter italic">Confirm Transmission</button>
                </form>
            </section>

        </div>
    </main>

    <script>
        let db, config = { name: '', desc: '', qs: [] }, responses = [];
        const ADMIN_KEY = "Indigo77X";

        // DB INIT
        const request = indexedDB.open("IndigoArchitectDB", 3);
        request.onupgradeneeded = e => {
            db = e.target.result;
            if(!db.objectStoreNames.contains("responses")) db.createObjectStore("responses", { autoIncrement: true });
            if(!db.objectStoreNames.contains("meta")) db.createObjectStore("meta", { keyPath: "id" });
        };
        request.onsuccess = e => { db = e.target.result; startup(); };

        async function startup() {
            lucide.createIcons();
            const urlParams = new URLSearchParams(window.location.search);
            
            if(urlParams.get('key') === ADMIN_KEY) {
                await syncData();
                switchTab('build');
            } else {
                await syncData();
                document.querySelector('aside').classList.add('hidden');
                document.querySelector('header').classList.add('hidden');
                switchTab('fill');
                renderLiveForm();
            }
        }

        async function syncData() {
            return new Promise(resolve => {
                db.transaction("meta","readonly").objectStore("meta").get("protocol").onsuccess = e => {
                    if(e.target.result) {
                        config = e.target.result;
                        document.getElementById('form-name').value = config.name;
                        document.getElementById('form-desc').value = config.desc;
                        document.getElementById('header-title').innerText = config.name || "Untitled_Protocol";
                    }
                    db.transaction("responses","readonly").objectStore("responses").getAll().onsuccess = e => {
                        responses = e.target.result;
                        renderBuilder();
                        resolve();
                    };
                };
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(t+'-tab').classList.add('active');
            document.querySelectorAll('.sidebar-item').forEach(l => l.classList.remove('active'));
            const link = document.getElementById('m-'+t);
            if(link) link.classList.add('active');
            if(t === 'data') renderDataVault();
        }

        // ARCHITECT LOGIC
        function addQuestion(type) {
            const newQ = { id: 'q' + Date.now(), type: type, label: 'New Data Point', opts: ['Option A', 'Option B'] };
            config.qs.push(newQ);
            saveProtocol();
            renderBuilder();
        }

        function renderBuilder() {
            const canvas = document.getElementById('builder-canvas');
            const empty = document.getElementById('empty-state');
            
            if(config.qs.length === 0) {
                empty.classList.remove('hidden');
                canvas.innerHTML = '';
            } else {
                empty.classList.add('hidden');
                canvas.innerHTML = config.qs.map((q, i) => `
                    <div class="glass-card p-6 flex items-center justify-between group hover:border-indigo-300 transition-all">
                        <div class="flex items-center gap-6 flex-1">
                            <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-300">
                                <i data-lucide="${q.type === 'text' ? 'type' : 'list-checks'}" class="w-5 h-5"></i>
                            </div>
                            <div class="flex-1">
                                <input type="text" value="${q.label}" oninput="updateQLabel(${i}, this.value)" class="block w-full font-bold text-lg outline-none bg-transparent">
                                <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">${q.type} Field</span>
                            </div>
                        </div>
                        <button onclick="removeQuestion(${i})" class="p-3 text-slate-300 hover:text-red-500 transition">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function updateQLabel(index, val) {
            config.qs[index].label = val;
            saveProtocol();
        }

        function removeQuestion(index) {
            config.qs.splice(index, 1);
            saveProtocol();
            renderBuilder();
        }

        function saveProtocol() {
            config.name = document.getElementById('form-name').value;
            config.desc = document.getElementById('form-desc').value;
            document.getElementById('header-title').innerText = config.name || "Untitled_Protocol";
            db.transaction("meta","readwrite").objectStore("meta").put({id:"protocol", ...config});
        }

        // RESPONDENT LOGIC
        function renderLiveForm() {
            document.getElementById('fill-header').innerHTML = `
                <h1 class="text-6xl font-black tracking-tighter text-slate-900 uppercase italic">${config.name || 'INDIGO_VOID'}</h1>
                <p class="text-xl text-slate-400 mt-4 font-medium">${config.desc || 'Pending protocol information...'}</p>
            `;
            document.getElementById('fill-questions').innerHTML = config.qs.map(q => `
                <div class="glass-card p-8 shadow-sm">
                    <label class="block font-bold text-xl mb-6 text-slate-800">${q.label}</label>
                    ${q.type === 'choice' ? q.opts.map(o => `
                        <label class="flex items-center gap-4 p-4 mb-2 bg-slate-50 rounded-2xl cursor-pointer hover:bg-indigo-50 border border-transparent hover:border-indigo-200 transition">
                            <input type="radio" name="${q.id}" value="${o}" required class="w-5 h-5 accent-indigo-600">
                            <span class="font-bold text-slate-600">${o}</span>
                        </label>
                    `).join('') : `
                        <input type="text" name="${q.id}" required placeholder="Input required data..." class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-medium border-2 border-transparent focus:border-indigo-600 transition">
                    `}
                </div>
            `).join('');
        }

        document.getElementById('submission-form').onsubmit = e => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            data._ts = new Date().toLocaleString();
            
            db.transaction("responses","readwrite").objectStore("responses").add(data).onsuccess = () => {
                alert("Transmission Successful.");
                location.reload();
            };
        };

        // DATA VAULT
        function renderDataVault() {
            syncData().then(() => {
                document.getElementById('data-grid').innerHTML = responses.map(r => `
                    <div class="glass-card p-6 flex flex-col md:flex-row md:items-center justify-between gap-6">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center font-black italic">ID</div>
                            <div>
                                <p class="text-xl font-black italic tracking-tighter">${r.sys_username}</p>
                                <p class="text-[10px] font-mono text-slate-400 uppercase">${r._ts}</p>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${Object.keys(r).filter(k => !k.startsWith('_') && k !== 'sys_username').map(k => `
                                <div class="px-4 py-2 bg-slate-50 rounded-xl border border-slate-100">
                                    <p class="text-[8px] font-black text-indigo-500 uppercase mb-1">${config.qs.find(q=>q.id===k)?.label || 'Field'}</p>
                                    <p class="text-xs font-bold text-slate-700">${r[k]}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).reverse().join('');
            });
        }

        function copyURL(type) {
            const url = window.location.origin + window.location.pathname + (type === 'admin' ? `?key=${ADMIN_KEY}` : '');
            navigator.clipboard.writeText(url);
            alert(`${type.toUpperCase()} link copied.`);
        }

        function exportCSV() {
            let csv = "Timestamp,User\n";
            responses.forEach(r => csv += `${r._ts},${r.sys_username}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Indigo_Export.csv`;
            link.click();
        }
    </script>
</body>
</html>
